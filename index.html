<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scroller</title>
    <link rel="icon" type="image/png" href="assets/happyscroller.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Urbanist:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img src="assets/front-scroller.png" class="scroller-background left-scroller" alt="Decoração Esquerda">
    <img src="assets/critical-scroller.png" class="scroller-background right-scroller" alt="Decoração Direita">

    <main class="game-container">
        
        <div id="phone-screen">
            
            <header id="status-header" class="hidden">
                <div class="bar-container">
                    <span>DIRETORIA</span>
                    <div class="progress-bar">
                        <div id="bar-diretoria" class="fill fill-dir"></div>
                        <span id="text-diretoria" class="bar-text">50%</span>
                    </div>
                </div>
                <div class="bar-container">
                    <span>CRIADORES</span>
                    <div class="progress-bar">
                        <div id="bar-criadores" class="fill fill-cri"></div>
                        <span id="text-criadores" class="bar-text">50%</span>
                    </div>
                </div>
                <div class="bar-container">
                    <span>INFRA</span>
                    <div class="progress-bar">
                        <div id="bar-infra" class="fill fill-inf"></div>
                        <span id="text-infra" class="bar-text">50%</span>
                    </div>
                </div>
            </header>

            <div id="minigame-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13, 17, 23, 0.98); z-index: 999; display: none; flex-direction: column; justify-content: center; align-items: center; border-radius: inherit;">
    
                <h2 id="mg-ingame-title" style="color: #58a6ff; font-family: 'Urbanist'; margin-bottom: 5px;">THROTTLING ATIVADO</h2>
                <p style="color: #c9d1d9; font-size: 12px; margin-bottom: 15px;">Setinhas para mover. Sobreviva ao sistema!</p>
                        
                <canvas id="game-canvas" width="280" height="280" style="border: 3px solid #30363d; background: #000; border-radius: 10px; box-shadow: 0 0 20px rgba(88, 166, 255, 0.2);"></canvas>
                        
                <div style="color: #fff; margin-top: 15px; font-family: 'Urbanist'; font-size: 18px;">
                    TEMPO: <span id="mg-timer" style="color: #f778ba;">0</span>s | <span id="mg-score" style="color: #39d353;">0</span>
                </div>
            
                <div id="mg-modal" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13, 17, 23, 0.98); z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px; border-radius: inherit;">
                    <h2 id="mg-modal-title" style="color: #58a6ff; font-family: 'Urbanist'; margin-bottom: 15px;">TÍTULO</h2>
                    <p id="mg-modal-text" style="color: #c9d1d9; font-size: 14px; margin-bottom: 25px; line-height: 1.5;">Texto descritivo do modal.</p>
                    <button id="mg-modal-btn" class="game-btn" style="width: 80%;">AÇÃO</button>
                </div>
            </div>

            <div id="game-content"></div>

        </div>

    </main>

    <audio id="bg-music"></audio>
    <audio id="sfx-player"></audio>

    <script src="db.js"></script>
    <script src="app.js"></script>
    <script src="minigame.js"></script>
    
</body>
</html>
